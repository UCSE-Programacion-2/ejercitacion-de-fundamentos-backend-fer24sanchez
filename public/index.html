<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutería API - Frontend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen text-slate-100 p-8">
    <div class="max-w-6xl mx-auto space-y-12">
        <!-- Header -->
        <header class="text-center space-y-4">
            <h1 class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                Frutería API
            </h1>
            <p class="text-slate-400 text-lg">Interactúa con el backend para gestionar el inventario</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Forms -->
            <div class="space-y-8 lg:col-span-1">
                
                <!-- Buscador por ID -->
                <div class="bg-white/10 backdrop-blur-lg border border-white/20 p-6 rounded-2xl shadow-xl">
                    <h2 class="text-2xl font-semibold mb-4 text-emerald-300">🔍 Buscar por ID</h2>
                    <form id="searchForm" class="space-y-4">
                        <div>
                            <input type="number" id="searchId" placeholder="Ej: 1" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all" required>
                        </div>
                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-emerald-500/30">
                            Buscar Fruta
                        </button>
                    </form>
                    <div id="searchResult" class="mt-4 hidden">
                        <!-- Render search result here -->
                    </div>
                </div>

                <!-- Buscador por Nombre (Query string) -->
                <div class="bg-white/10 backdrop-blur-lg border border-white/20 p-6 rounded-2xl shadow-xl">
                    <h2 class="text-2xl font-semibold mb-4 text-fuchsia-300">🔎 Buscar por Nombre</h2>
                    <form id="searchNameForm" class="space-y-4">
                        <div>
                            <input type="text" id="searchName" placeholder="Ej: manzana" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 transition-all" required>
                        </div>
                        <button type="submit" class="w-full bg-fuchsia-500 hover:bg-fuchsia-600 text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-fuchsia-500/30">
                            Filtrar por Query
                        </button>
                    </form>
                    <div id="searchNameResult" class="mt-4 hidden max-h-40 overflow-y-auto space-y-2">
                        <!-- Render search result here -->
                    </div>
                </div>

                <!-- Formulario POST -->
                <div class="bg-white/10 backdrop-blur-lg border border-white/20 p-6 rounded-2xl shadow-xl">
                    <h2 class="text-2xl font-semibold mb-4 text-cyan-300">✨ Nueva Fruta</h2>
                    <form id="addForm" class="space-y-4">
                        <div>
                            <input type="text" id="addImagen" placeholder="Emoji (ej: 🍎)" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" required>
                        </div>
                        <div>
                            <input type="text" id="addNombre" placeholder="Nombre (ej: Manzanas)" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="addImporte" placeholder="Importe ($)" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" required>
                            <input type="number" id="addStock" placeholder="Stock" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" required>
                        </div>
                        <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-cyan-500/30">
                            Agregar Fruta
                        </button>
                    </form>
                </div>

            </div>

            <!-- Right Column: Grid -->
            <div class="lg:col-span-2">
                <div class="bg-white/5 backdrop-blur-sm border border-white/10 p-6 rounded-2xl min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-semibold">📦 Inventario Actual</h2>
                        <button id="btnRefresh" class="text-slate-400 hover:text-white transition-colors" title="Actualizar">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>
                    
                    <div id="loading" class="text-center py-12 text-slate-400">
                        Esperando que implementes los endpoints... ¡Anímate!
                    </div>

                    <div id="errorMsg" class="hidden text-center py-12 text-red-400 bg-red-400/10 rounded-xl border border-red-400/20">
                        Error al conectar con el servidor. ¿Seguro que completaste el endpoint GET /frutas?
                    </div>

                    <div id="fruitsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 hidden">
                        <!-- Cards here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/frutas';

        // Elements
        const fruitsGrid = document.getElementById('fruitsGrid');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const searchForm = document.getElementById('searchForm');
        const searchResult = document.getElementById('searchResult');
        const addForm = document.getElementById('addForm');
        const btnRefresh = document.getElementById('btnRefresh');

        // Fetch All
        const fetchFrutas = async () => {
            try {
                loading.classList.remove('hidden');
                errorMsg.classList.add('hidden');
                fruitsGrid.classList.add('hidden');
                fruitsGrid.innerHTML = '';

                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Error de red');
                const data = await res.json();

                if (Array.isArray(data)) {
                    data.forEach(fruta => {
                        fruitsGrid.appendChild(createCard(fruta));
                    });
                    fruitsGrid.classList.remove('hidden');
                } else {
                    throw new Error('Formato inválido');
                }
            } catch (err) {
                errorMsg.classList.remove('hidden');
                errorMsg.innerHTML = 'Aún no se ha implementado el endpoint <code class="bg-red-500/20 px-1 rounded">GET /frutas</code> o hay un error en el código del servidor.';
            } finally {
                loading.classList.add('hidden');
            }
        };

        const createCard = (fruta) => {
            const div = document.createElement('div');
            div.className = "bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl p-4 transition-all hover:-translate-y-1 shadow-lg group";
            div.innerHTML = `
                <div class="text-4xl text-center mb-3 group-hover:scale-110 transition-transform">${fruta.imagen || '📦'}</div>
                <h3 class="text-xl font-bold text-center mb-2">${fruta.nombre}</h3>
                <div class="flex justify-between text-sm text-slate-300">
                    <span class="bg-slate-800 px-2 py-1 rounded border border-slate-600">ID: ${fruta.id}</span>
                    <span class="text-emerald-400 font-semibold">$${fruta.importe}</span>
                </div>
                <div class="text-center mt-3 text-sm text-slate-400">
                    Stock: ${fruta.stock} u.
                </div>
            `;
            return div;
        };

        // Search Form (ID)
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('searchId').value;
            searchResult.classList.remove('hidden');
            searchResult.innerHTML = '<p class="text-slate-400 text-sm">Buscando...</p>';
            
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const data = await res.json();
                
                if (res.ok && data.id) {
                    searchResult.innerHTML = `
                        <div class="bg-emerald-500/20 border border-emerald-500/30 rounded-lg p-3 text-sm">
                            <span class="text-2xl align-middle mr-2">${data.imagen}</span>
                            <strong>${data.nombre}</strong> - $${data.importe} (Stock: ${data.stock})
                        </div>
                    `;
                } else {
                    searchResult.innerHTML = `
                        <div class="bg-red-500/20 border border-red-500/30 rounded-lg p-3 text-sm text-red-200">
                            ${data.error || 'Fruta no encontrada o error'}
                        </div>
                    `;
                }
            } catch (err) {
                searchResult.innerHTML = '<p class="text-red-400 text-sm">El endpoint <strong>GET /frutas/:id</strong> no está implementado o falla.</p>';
            }
        });

        // Search Form (Query Name)
        const searchNameForm = document.getElementById('searchNameForm');
        const searchNameResult = document.getElementById('searchNameResult');
        searchNameForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('searchName').value;
            searchNameResult.classList.remove('hidden');
            searchNameResult.innerHTML = '<p class="text-slate-400 text-sm">Buscando por nombre...</p>';
            
            try {
                const res = await fetch(`${API_URL}/buscar?nombre=${encodeURIComponent(name)}`);
                const data = await res.json();
                
                if (res.ok && Array.isArray(data)) {
                    if (data.length > 0) {
                        searchNameResult.innerHTML = data.map(f => `
                            <div class="bg-fuchsia-500/20 border border-fuchsia-500/30 rounded-lg p-3 text-sm flex items-center">
                                <span class="text-xl align-middle mr-2">${f.imagen}</span>
                                <div>
                                    <strong>${f.nombre}</strong> <span class="text-fuchsia-200 ml-2">ID: ${f.id}</span>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        searchNameResult.innerHTML = `
                            <div class="bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm text-slate-300 text-center">
                                No se encontraron frutas con ese nombre
                            </div>
                        `;
                    }
                } else {
                    throw new Error('Formato inválido');
                }
            } catch (err) {
                searchNameResult.innerHTML = '<p class="text-red-400 text-sm">El endpoint <strong>GET /frutas/buscar?nombre=...</strong> no está implementado o falla.</p>';
            }
        });

        // Add Form
        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = addForm.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Agregando...';
            btn.disabled = true;

            const newFruit = {
                imagen: document.getElementById('addImagen').value,
                nombre: document.getElementById('addNombre').value,
                importe: Number(document.getElementById('addImporte').value),
                stock: Number(document.getElementById('addStock').value)
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newFruit)
                });

                if (res.ok) {
                    addForm.reset();
                    fetchFrutas(); // Recargar el grid
                    btn.textContent = '¡Agregado con éxito!';
                    btn.classList.replace('bg-cyan-500', 'bg-emerald-500');
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.classList.replace('bg-emerald-500', 'bg-cyan-500');
                        btn.disabled = false;
                    }, 2000);
                } else {
                    throw new Error('Error al agregar');
                }
            } catch (err) {
                btn.textContent = 'Error: Endpoint POST no implementado';
                btn.classList.replace('bg-cyan-500', 'bg-red-500');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.replace('bg-red-500', 'bg-cyan-500');
                    btn.disabled = false;
                }, 3000);
            }
        });

        // Init
        btnRefresh.addEventListener('click', fetchFrutas);
        fetchFrutas();
    </script>
</body>
</html>
